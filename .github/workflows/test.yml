name: Docker Jest Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t user-service .

      - name: Run Jest Tests
        run: docker run --rm user-service